<div class="backend-unavailable-page d-flex align-items-center justify-content-center min-vh-100 p-3 p-md-4">
  <div class="card unavailable-card shadow-lg border-0 overflow-hidden">
    <div class="logo-header p-4 text-center border-bottom">
      <div class="d-inline-flex align-items-center gap-2">
        <i class="bi bi-box-seam-fill text-primary fs-3"></i>
        <span class="brand-title fw-bold">Portalcrane</span>
      </div>
    </div>

    <div class="card-body p-4 p-md-5 text-center">
      <div class="status-icon mx-auto mb-3 d-inline-flex align-items-center justify-content-center rounded-circle">
        <i class="bi bi-plug-fill text-warning fs-2"></i>
      </div>

      <h1 class="h4 mb-2">Connection unavailable</h1>
      <p class="text-muted mb-4">
        The connection to the server has been lost. Please wait....
      </p>

      <div class="d-flex align-items-center justify-content-center gap-2 mb-3 text-primary">
        <div class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></div>
        <span class="small fw-semibold">Attempting to reconnect.</span>
      </div>

      <div class="progress reconnection-progress" role="progressbar" aria-label="Reconnexion backend">
        <div class="progress-bar progress-bar-striped progress-bar-animated w-100"></div>
      </div>
    </div>
  </div>
</div>
