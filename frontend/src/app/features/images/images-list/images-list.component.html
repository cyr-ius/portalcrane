<!-- Source selector section REPLACEMENT for images-list.component.html -->
<!--
  Replace the existing "Source selector (Évolution 1)" block with this one.
  The only change is the addition of a spinner shown while checkingCatalog()
  is true (catalog availability probes in flight).
  When all probes complete, only registries with available=true are displayed.
  If no registry passed the check, the entire source selector card is hidden.
-->

  <!-- ── Source selector (Évolution 1 + catalog availability check) ──────── -->
  @if (checkingCatalog()) {
    <!-- Spinner while parallel catalog probes are in progress -->
    <div class="card border-0 mb-3">
      <div class="card-body py-2">
        <div class="d-flex align-items-center gap-2 text-muted small">
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          <span>Checking available source registries…</span>
        </div>
      </div>
    </div>
  } @else if (externalRegistries().length > 0) {
    <!-- Source selector: only browsable registries are listed here -->
    <div class="card border-0 mb-3">
      <div class="card-body py-2">
        <div class="d-flex align-items-center gap-2 flex-wrap">
          <span class="text-muted small fw-semibold me-1">
            <i class="bi bi-hdd-network me-1"></i>Source:
          </span>

          <!-- Local registry option -->
          <button
            class="btn btn-sm"
            [class.btn-primary]="!isExternalSource()"
            [class.btn-outline-secondary]="isExternalSource()"
            (click)="selectSource('local')"
          >
            <i class="bi bi-hdd me-1"></i>Local Registry
          </button>

          <!-- One button per external registry that passed catalog-check -->
          @for (reg of externalRegistries(); track reg.id) {
            <button
              class="btn btn-sm"
              [class.btn-info]="selectedSource() === reg.id"
              [class.btn-outline-secondary]="selectedSource() !== reg.id"
              (click)="selectSource(reg.id)"
              [title]="reg.host"
            >
              <i class="bi bi-globe me-1"></i>{{ reg.name }}
            </button>
          }
        </div>
      </div>
    </div>
  }
  <!-- When checkingCatalog=false and externalRegistries is empty, no selector
       is shown at all (all configured registries failed the catalog check or
       none are configured). -->
