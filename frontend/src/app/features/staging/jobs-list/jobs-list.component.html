<div class="card border-0">
    <div class="card-header border-0 d-flex align-items-center justify-content-between">
        <h6 class="fw-semibold mb-0">
        <i class="bi bi-list-task me-2"></i>Pipeline Jobs
        </h6>
        <span class="badge bg-secondary-subtle text-secondary">
        {{ jobSvc.jobs().length }}
        </span>
    </div>
    <div class="card-body p-0">
        @if (jobSvc.jobs().length === 0) {
        <div class="text-center py-5 text-muted">
            <i
            class="bi bi-cloud-download display-4 d-block mb-3 opacity-25"
            ></i>
            No staging jobs yet. Select a source and pull an image to get
            started.
        </div>
        } @else {
        <div class="job-list p-3 d-flex flex-column gap-3">
            @for (job of jobSvc.jobs(); track job.job_id) {
                <app-job-detail [job]="job" />
            }
        </div>
        }
    </div>
</div>
