# ─── Portalcrane Development Stack ─────────────────────────────────────────
# Includes: Portalcrane app, Docker Registry
# Usage: docker compose up -d

services:
  # ── Portalcrane Application ──────────────────────────────────────────────
  portalcrane:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portalcrane
    ports:
      - "8000:8000"
    environment:
      # ── Registry configuration ────────────────────────────────────────────
      - REGISTRY_PROXY_AUTH_ENABLED=${REGISTRY_PROXY_AUTH_ENABLED:-true}

      # ── Admin credentials ─────────────────────────────────────────────────
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}

      # ── JWT (optional) ────────────────────────────────────────────────────
      # Leave SECRET_KEY unset to auto-generate and persist one under DATA_DIR.
      - SECRET_KEY=${SECRET_KEY:-}

      # ── OIDC (optional) ───────────────────────────────────────────────────
      - OIDC_ENABLED=${OIDC_ENABLED:-false}
      - OIDC_ISSUER=${OIDC_ISSUER:-}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:8000/auth/callback}

      # ── Docker Hub (optional, for staging pulls) ──────────────────────────
      - DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME:-}
      - DOCKERHUB_PASSWORD=${DOCKERHUB_PASSWORD:-}

      # ── Vulnerability scanning (Trivy) ────────────────────────────────────
      - VULN_SCAN_ENABLED=${VULN_SCAN_ENABLED:-true}
      - VULN_SCAN_SEVERITIES=${VULN_SCAN_SEVERITIES:-CRITICAL,HIGH}
      - VULN_IGNORE_UNFIXED=${VULN_IGNORE_UNFIXED:-false}
      - VULN_SCAN_TIMEOUT=${VULN_SCAN_TIMEOUT:-5m}

      # ── HTTP Proxy (optional) ─────────────────────────────────────────────
      # - HTTP_PROXY=http://proxy.corp:3128
      # - HTTPS_PROXY=http://proxy.corp:3128
      # - NO_PROXY=localhost,127.0.0.1

      # ── Syslog forwarding (optional) ──────────────────────────────────────
      # Defaults; a persisted override from the Network UI takes precedence.
      # - SYSLOG_ENABLED=true
      # - SYSLOG_HOST=syslog.corp.example.com
      # - SYSLOG_PORT=6514
      # - SYSLOG_PROTOCOL=tcp+tls        # udp | tcp | tcp+tls
      # - SYSLOG_RFC=rfc5424             # rfc5424 | rfc3164
      # - SYSLOG_FORWARD_AUDIT=true
      # - SYSLOG_FORWARD_UVICORN=false

      # ── Audit log by email (optional) ─────────────────────────────────────
      # Defaults; a persisted override from the Network UI takes precedence.
      # - EMAIL_ENABLED=true
      # - EMAIL_HOST=smtp.corp.example.com
      # - EMAIL_PORT=587
      # - EMAIL_SECURITY=starttls        # none | starttls | ssl
      # - EMAIL_USERNAME=portalcrane
      # - EMAIL_PASSWORD=change-me
      # - EMAIL_FROM_ADDRESS=portalcrane@corp.example.com
      # - EMAIL_TO_ADDRESSES=security@corp.example.com

      # ── Logging ───────────────────────────────────────────────────────────
      - SWAGGER_ENABLED=${SWAGGER_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}

    volumes:
      - portalcrane_data:/var/lib/portalcrane
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

