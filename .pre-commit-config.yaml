# ─── Pre-commit Configuration ──────────────────────────────────────────────
# Standards: PEP8 (Ruff + Black), TypeScript (Prettier + ESLint)
# Install: prek install --install-hooks
# Run manually: prek run --all-files

repos:
  # ── General ──────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: swagger
      - id: check-yaml
      - id: check-json
        exclude: .devcontainer|.vscode|tsconfig.*
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: .devcontainer|.vscode|.agents

  # ── Python: Ruff (formatter + linter + import sort) ──────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
        exclude: .agents
      - id: ruff-format
        exclude: .agents

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          # "te" is the RFC 7230 hop-by-hop HTTP header, not a typo.
          - --ignore-words-list=mailserver,te
          - --skip="./.*,*.csv,*.json,*.ambr"
          - --quiet-level=2
        exclude_types: [csv, json, html]
        # codespell only knows English: the translated READMEs are excluded,
        # otherwise every French/Spanish word is reported as a misspelling.
        exclude: .devcontainer|.agents|swagger|README\.(fr|es)\.md

  # ── TypeScript / Angular: Prettier ───────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: ["--print-width=120"]
        types_or: [javascript, html, css, scss, json, yaml, markdown]
        exclude: node_modules|.agents|swagger
